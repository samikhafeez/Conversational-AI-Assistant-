version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai-assistant-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHAT_MODEL=${CHAT_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - DEBUG=${DEBUG:-false}
      - DB_URL=sqlite:///./data/conversations.db
      - VECTOR_STORE_PATH=data/vector_store
    volumes:
      - ../data:/app/data          # persist vector store + SQLite DB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Streamlit Frontend ─────────────────────────────────────────────────────
  frontend:
    image: python:3.11-slim
    container_name: ai-assistant-frontend
    working_dir: /app
    command: >
      sh -c "pip install streamlit requests --quiet &&
             streamlit run frontend/app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ..:/app
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
